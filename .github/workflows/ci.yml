name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest tests

  rtl-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends verilator
      - run: verilator --lint-only -Wall -f rtl/filelists/generic-sim.f

  sim-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends verilator
      - run: uv sync --dev
      - run: uv run pytest tb -m "not nightly"
